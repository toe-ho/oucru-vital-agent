# vital-agent global config
#
# Docker:     llm.base_url = http://ollama:11434  (service name in compose)
# Local CLI:  change llm.base_url to http://localhost:11434

llm:
  provider: ollama           # "ollama" | "openai" | "anthropic"
  model: qwen3:8b            # any model pulled in Ollama
  base_url: http://ollama:11434   # Docker default; use http://localhost:11434 for local CLI
  temperature: 0.1           # low = more deterministic tool calling
  max_tokens: 4096

agent:
  max_steps: 15              # max tool calls per task before giving up
  timeout_seconds: 300       # seconds before falling back to rule-based assessment
  verbose: false             # set true for step-by-step stdout logging
  memory_window: 10          # how many past results to keep in context

data:
  raw_dir: data/raw
  processed_dir: data/processed
  watch_extensions: [.csv, .parquet, .edf, .txt]
  default_fs: 100            # default sampling frequency Hz (override per signal)

signal:
  ppg_fs: 100
  ecg_fs: 500
  default_window_sec: 30     # analysis window length in seconds

thresholds:
  sqi_min: 0.5               # below this = poor quality, flag segment
  hr_min: 40                 # bpm
  hr_max: 200                # bpm
  spo2_min: 88               # percent
